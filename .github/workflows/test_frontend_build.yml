name: Test Frontend Build

on:
  workflow_dispatch

jobs:
    build-frontend:
        name: Build Frontend
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
        - uses: actions/checkout@v4

        - name: Set up Node.js
          uses: actions/setup-node@v4
          with:
            node-version-file: 'src/nf_meta/editor/frontend/.node-version'

        - name: Install frontend dependencies
          working-directory: src/nf_meta/editor/frontend
          run: npm ci

        - name: Build frontend
          working-directory: src/nf_meta/editor/frontend
          run: npm run build

        - name: Configure git
          run: |
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"

        - name: Commit frontend build
          run: |
            git add src/nf_meta/editor/frontend_dist/
            git commit -m "ci: build frontend assets" || echo "No changes to commit"

        - name: Push changes
          run: git push origin HEAD:${{ github.event.repository.default_branch }}
